<!-- Custom 404 page -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/weather-icon.jpg" />
    <title>404 — Havāmāna</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0f0f1a;
        --bg-secondary: #1a1a2e;
        --bg-glass: rgba(255, 255, 255, 0.06);
        --border-glass: rgba(255, 255, 255, 0.08);
        --accent: #6c63ff;
        --accent-glow: rgba(108, 99, 255, 0.35);
        --accent-secondary: #00d2ff;
        --text-primary: #f0f0f5;
        --text-secondary: rgba(240, 240, 245, 0.6);
        --text-muted: rgba(240, 240, 245, 0.35);
        --gradient-hero: linear-gradient(135deg, #6c63ff 0%, #00d2ff 100%);
        --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.25);
        --shadow-glow: 0 0 40px var(--accent-glow);
        --radius-lg: 20px;
        --radius-xl: 28px;
      }

      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      /* Ambient background — same as main app */
      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
            ellipse 600px 600px at 20% 20%,
            rgba(108, 99, 255, 0.08) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 500px 500px at 80% 80%,
            rgba(0, 210, 255, 0.06) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 400px 400px at 60% 30%,
            rgba(255, 107, 107, 0.04) 0%,
            transparent 70%
          );
        animation: ambient-drift 25s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes ambient-drift {
        0% {
          transform: translate(0, 0) rotate(0deg);
        }
        100% {
          transform: translate(-30px, 20px) rotate(3deg);
        }
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        max-width: 500px;
        animation: fade-in-up 0.7s cubic-bezier(0.4, 0, 0.2, 1) both;
      }

      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Floating weather emoji */
      .weather-icon {
        font-size: 5rem;
        display: inline-block;
        animation: float 4s ease-in-out infinite;
        filter: drop-shadow(0 8px 20px rgba(108, 99, 255, 0.3));
        margin-bottom: 1.5rem;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        25% {
          transform: translateY(-12px) rotate(-3deg);
        }
        75% {
          transform: translateY(-6px) rotate(2deg);
        }
      }

      .error-code {
        font-size: 7rem;
        font-weight: 700;
        line-height: 1;
        background: var(--gradient-hero);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -3px;
        margin-bottom: 0.5rem;
      }

      .card {
        background: var(--bg-glass);
        border: 1px solid var(--border-glass);
        border-radius: var(--radius-xl);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: var(--shadow-md);
        padding: 2.5rem 2rem 2rem;
        position: relative;
        overflow: hidden;
      }

      /* Top accent stripe — matches WeatherDisplay */
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--gradient-hero);
        border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      }

      .title {
        font-size: 1.4rem;
        font-weight: 600;
        margin-bottom: 0.6rem;
      }

      .description {
        font-size: 0.95rem;
        color: var(--text-secondary);
        line-height: 1.6;
        margin-bottom: 2rem;
        font-weight: 300;
      }

      .home-btn {
        display: inline-block;
        background: var(--gradient-hero);
        color: #fff;
        border: none;
        border-radius: var(--radius-lg);
        padding: 0.75rem 2rem;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
          box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .home-btn:hover {
        transform: scale(1.05);
        box-shadow: var(--shadow-glow);
      }

      .home-btn:active {
        transform: scale(0.97);
      }

      /* Footer line */
      .footer-text {
        margin-top: 2rem;
        font-size: 0.78rem;
        color: var(--text-muted);
        font-weight: 300;
      }

      .footer-text a {
        color: var(--accent-secondary);
        text-decoration: none;
      }

      .footer-text a:hover {
        text-decoration: underline;
      }

      @media (max-width: 500px) {
        .error-code {
          font-size: 5rem;
        }

        .weather-icon {
          font-size: 3.5rem;
        }

        .card {
          padding: 2rem 1.4rem 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="weather-icon" aria-hidden="true">🌧️</div>
      <div class="card">
        <div class="error-code">404</div>
        <h1 class="title">Lost in the forecast</h1>
        <p class="description">
          Looks like this page drifted away with the clouds. The weather data
          you're looking for isn't here — but the skies are always clearer back
          home.
        </p>
        <a href="/" class="home-btn">Back to Havāmāna</a>
      </div>
      <p class="footer-text">
        <a href="/">havamana.onrender.com</a>
      </p>
    </div>
  </body>
</html>
